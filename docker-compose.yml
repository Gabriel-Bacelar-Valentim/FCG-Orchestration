version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" 
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    networks:
      - app-network

  users-api:
    image: fcg-users-api:latest
    build:
      context: .. 
      dockerfile: FCG.Users/UsersAPI/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq
    environment:
      - MASSTRANSIT_LICENSE_KEY=None
      - MT_LICENSE_KEY=None
      - RABBITMQ_HOST=rabbitmq
      - DB_CONNECTION_STRING=Host=users-db;Port=5432;Database=usersdb;Username=admin;Password=${DB_PASSWORD}
    networks:
      - app-network

  users-db:
    image: postgres:15
    container_name: users-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - users-data:/var/lib/postgresql/data
    networks:
      - app-network

  catalog-api:
    image: fcg-catalog-api:latest
    build:
      context: ..
      dockerfile: FCG.Catalog/CatalogAPI/Dockerfile
    ports:
      - "5202:8080"
    depends_on:
      - rabbitmq
    environment:
      - MASSTRANSIT_LICENSE_KEY=None
      - MT_LICENSE_KEY=None
      - RABBITMQ_HOST=rabbitmq
      - DB_CONNECTION_STRING=Host=catalog-db;Port=5432;Database=catalogdb;Username=admin;Password=${DB_PASSWORD}
    networks:
      - app-network

  catalog-db:
    image: postgres:15
    container_name: catalog-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: catalogdb
    ports:
      - "5433:5432"
    volumes:
      - catalog-data:/var/lib/postgresql/data
    networks:
      - app-network

  payments-api:
    image: fcg-payments-api:latest
    build:
      context: ..
      dockerfile: FCG.Payments/PaymentsAPI/Dockerfile
    ports:
      - "5158:8080"
    depends_on:
      - rabbitmq
    environment:
      - MASSTRANSIT_LICENSE_KEY=None
      - MT_LICENSE_KEY=None
      - RABBITMQ_HOST=rabbitmq
      - DB_CONNECTION_STRING=Host=payments-db;Port=5432;Database=paymentsdb;Username=admin;Password=${DB_PASSWORD}
    networks:
      - app-network

  payments-db:
    image: postgres:15
    container_name: payments-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: paymentsdb
    ports:
      - "5434:5432"
    volumes:
      - payments-data:/var/lib/postgresql/data
    networks:
      - app-network

  notifications-api:
    image: fcg-notifications-api:latest
    build:
      context: ..
      dockerfile: FCG.Notifications/NotificationsAPI/Dockerfile
    ports:
      - "5241:8080"
    depends_on:
      - rabbitmq
    environment:
      - MASSTRANSIT_LICENSE_KEY=None
      - MT_LICENSE_KEY=None
      - RABBITMQ_HOST=rabbitmq
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  users-data:
  catalog-data:
  payments-data: